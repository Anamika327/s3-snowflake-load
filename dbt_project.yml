name: 'demo_pipeline'
version: '1.0.0'
config-version: 2

profile: 'demo'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
data-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  demo_pipeline:
    staging:
      +materialized: view
    marts:
      +materialized: table
      +tags: ["daily"]

vars:
  start_date: '2024-01-01'
  end_date: '2026-04-26'